name: Build iOS Tweak via Theos

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Theos Environment
      run: |
        # استخدام depth=1 يسرع التحميل ويحل مشكلة الأخطاء 128 الخاصة بالسحب بالكامل
        git clone --depth=1 --recursive https://github.com $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        
    - name: Set up iOS SDK
      run: |
        git clone --depth=1 https://github.com $HOME/theos/sdks
        
    - name: Compile Project
      run: |
        make package FINALPACKAGE=1
        
    - name: Upload Compiled Files
      uses: actions/upload-artifact@v4
      with:
        name: Autotouh-ModMenu-Package
        path: |
          .theos/obj/debug/*.dylib
          .theos/obj/*.dylib
          packages/*.deb
          *.deb
