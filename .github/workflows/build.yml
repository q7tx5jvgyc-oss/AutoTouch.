name: Mustache Yalla Ludo Touch Builder
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build_job:
    runs-on: macos-14
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Construct Silent Tweak Files
      run: |
        # 1. إنشاء ملف البيانات الوصفية (control)
        cat << 'EOF' > control
        Package: com.mustache.silentludo
        Name: Mustache Silent Ludo Clicker
        Depends: mobilesubstrate
        Version: 7.0.0
        Architecture: iphoneos-arm64
        Description: ماكرو موستاش المخفي ليلا لودو - تحكم بأزرار الصوت لمنع الفريز ونقرات حقيقية 100%
        Maintainer: Mustache Developer
        Author: Mustache
        Section: Tweaks
        EOF

        # 2. إنشاء ملف التوجيه والفلتر ليعمل داخل نظام الأيفون واللعبة (plist)
        cat << 'EOF' > MustacheSilentLudo.plist
        {
            Filter = {
                Bundles = ( "com.apple.springboard", "com.yallatech.yallaludo" );
            };
        }
        EOF

        # 3. إنشاء ملف التجميع الـ Makefile
        cat << 'EOF' > Makefile
        TARGET := iphone:clang:latest:14.0
        ARCHS := arm64 arm64e

        include $(THEOS)/makefiles/common.mk

        TWEAK_NAME = MustacheSilentLudo
        MustacheSilentLudo_FILES = main.mm
        MustacheSilentLudo_CFLAGS = -fobjc-arc
        MustacheSilentLudo_FRAMEWORKS = UIKit CoreGraphics
        MustacheSilentLudo_PRIVATE_FRAMEWORKS = IOKit

        include $(THEOS_MAKE_PATH)/tweak.mk
        EOF

        # 4. كتابة ملف البرمجة الذكي الصامت (main.mm) المرتبط بأزرار الصوت
        cat << 'EOF' > main.mm
        #import <UIKit/UIKit.h>
        #import <CoreGraphics/CoreGraphics.h>
        #import <mach/mach_time.h>

        // استدعاء حاقن أحداث اللمس الفيزيائية للنظام لتخطي حماية لودو
        extern "C" {
            CFTypeRef IOHIDEventCreateDigitizerFingerEvent(CFAllocatorRef allocator, uint64_t timeStamp, uint32_t index, uint32_t identity, uint32_t eventMask, float x, float y, float z, float tipPressure, float twist, objc_bool isInRange, objc_bool isTouched, uint32_t options);
            void IOHIDEventSystemClientQueueEvent(CFTypeRef client, CFTypeRef event);
            CFTypeRef IOHIDEventSystemClientCreate(CFAllocatorRef allocator);
        }

        // إدارة معالج النقر صامتاً في الخلفية
        @interface MustacheLudoEngine : NSObject
        @property (nonatomic, assign) BOOL isClicking;
        @property (nonatomic, assign) CFTypeRef hidClient;
        @property (nonatomic, strong) dispatch_source_t ludoTimer;
        + (instancetype)sharedEngine;
        - (void)startClicking;
        - (void)stopClicking;
        @end

        @implementation MustacheLudoEngine

        + (instancetype)sharedEngine {
            static MustacheLudoEngine *shared = nil;
            static dispatch_once_t onceToken;
            dispatch_once(&onceToken, ^{
                shared = [[self alloc] init];
            });
            return shared;
        }

        - (instancetype)init {
            self = [super init];
            if (self) {
                self.isClicking = NO;
                self.hidClient = IOHIDEventSystemClientCreate(kCFAllocatorDefault);
            }
            return self;
        }

        - (void)startClicking {
            if (self.isClicking) return;
            self.isClicking = YES;
            
            // تشغيل ميقاتي النقرات السريع على مسار خلفي منفصل تماماً لمنع أي فريز باللعبة
            dispatch_queue_t ludoQueue = dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_HIGH, 0);
            self.ludoTimer = dispatch_source_create(DISPATCH_SOURCE_TYPE_TIMER, 0, 0, ludoQueue);
            
            // سرعة النقر الافتراضية (0.05 ثانية - سريعة وخارقة لضرب النرد والقطع)
            uint64_t interval = (uint64_t)(0.05 * NSEC_PER_SEC);
            dispatch_source_set_timer(self.ludoTimer, dispatch_walltime(NULL, 0), interval, 0);
            
            dispatch_source_set_event_handler(self.ludoTimer, ^{
                // إحداثيات افتراضية لمنتصف الشاشة وموقع النرد في لودو (يتم ضبطها حسب موديل الأيفون)
                // الإحداثي الافتراضي لغالبية شاشات الأيفون هو تقريباً (X: 187, Y: 550) لمكان النرد
                CGPoint nardPoint = CGPointMake(187.0, 550.0);
                [self injectLudoHardwareTouchAt:nardPoint];
            });
            dispatch_resume(self.ludoTimer);
        }

        - (void)stopClicking {
            if (!self.isClicking) return;
            self.isClicking = NO;
            if (self.ludoTimer) {
                dispatch_source_cancel(self.ludoTimer);
                self.ludoTimer = nil;
            }
        }

        - (void)injectLudoHardwareTouchAt:(CGPoint)point {
            if (!self.hidClient) return;
            
            uint64_t downTime = mach_absolute_time();
            CFTypeRef touchDown = IOHIDEventCreateDigitizerFingerEvent(kCFAllocatorDefault, downTime, 1, 2, 3, point.x, point.y, 0, 1.0, 0, true, true, 0);
            if (touchDown) {
                IOHIDEventSystemClientQueueEvent(self.hidClient, touchDown);
                CFRelease(touchDown);
            }
            
            uint64_t upTime = mach_absolute_time();
            CFTypeRef touchUp = IOHIDEventCreateDigitizerFingerEvent(kCFAllocatorDefault, upTime, 1, 2, 0, point.x, point.y, 0, 0.0, 0, true, false, 0);
            if (touchUp) {
                IOHIDEventSystemClientQueueEvent(self.hidClient, touchUp);
                CFRelease(touchUp);
            }
        }
        @end

        // 🚀 خطف أزرار رفع وخفض الصوت من النظام للتحكم بالماكرو صامتاً 🚀
        %hook VolumeControl
        - (void)increaseVolume {
            // عند ضغط زر رفع الصوت (+)، يتم تفعيل الكليكر فوراً
            [[MustacheLudoEngine sharedEngine] startClicking];
        }

        - (void)decreaseVolume {
            // عند ضغط زر خفض الصوت (-)، يتم إيقاف الكليكر فوراً
            [[MustacheLudoEngine sharedEngine] stopClicking];
        }
        %end

        static void __attribute__((constructor)) initMustacheSilentCore() {
            // تهيئة معالج لودو الصامت عند تشغيل اللعبة
            [MustacheLudoEngine sharedEngine];
        }
        EOF

    - name: Download Theos Toolchain
      run: |
        bash -c "$(curl -fsSL https://githubusercontent.com)"
        echo "THEOS=~/theos" >> $GITHUB_ENV

    - name: Compile Package
      run: |
        make package FINALPACKAGE=1
